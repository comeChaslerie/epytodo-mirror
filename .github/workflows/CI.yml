name: CI

env:
  MIRROR_SSH_URL: 'git@github.com:EpitechPGE1-2025/G-WEB-200-NAN-2-1-epytodo-4.git'
  EXECUTABLES: "project"

on:
  push:
    branches-ignore: 
      - 'no-ga/*'
  pull_request:
    branches-ignore: 
      - 'no-ga/*'

jobs:

  check_repo_url:
    runs-on: ubuntu-latest
    steps:
      - run: exit 1
        if: env.MIRROR_SSH_URL == github.event.repository.ssh_url

  push_to_mirror:
    runs-on: ubuntu-latest
    needs: check_repo_url
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url:
            ${{ env.MIRROR_SSH_URL }}
          ssh_private_key:
            ${{ secrets.GIT_SSH_PRIVATE_KEY }}
