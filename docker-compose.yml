services:

  web_server:
    depends_on:
      - db
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    image: web_server
    ports:
      - 3000:3000
    networks:
      - db
    environment:
      - PORT=${PORT}
      - MYSQL_HOST=db
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - SECRET=${SECRET}

  db:
    restart: always
    image: mysql:9.7
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./epytodo.sql:/docker-entrypoint-initdb.d/schema.sql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    networks:
      - db

volumes:
  db-data:
    name: db-data
    driver: local

networks:
  db:
    driver: bridge
